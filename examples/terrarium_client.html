<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATM Terrarium</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      color-scheme: light;
      /* 아기자기하고 따뜻한 파스텔 톤 팔레트 */
      --bg: #fff5f5;          /* 부드러운 핑크빛 배경 */
      --panel: #ffffff;
      --panel-muted: #fff0f2; /* 카드 내부 연한 배경 */
      --line: #ffd1d8;        /* 테두리 (딸기우유빛) */
      --line-strong: #ffaebc;
      --text: #5c4a4d;        /* 진한 초코브라운 (부드러운 대비) */
      --text-muted: #9e8488;
      --accent: #ff8da1;      /* 메인 포인트 컬러 (코랄 핑크) */
      --accent-soft: #ffe4e8;
      --danger: #ff7676;
      --warning: #ffbd59;
      --success: #5cdb95;     /* 산뜻한 민트 */
      --shadow: 0 8px 24px rgba(255, 141, 161, 0.15);
      --radius: 24px;         /* 둥글둥글한 모서리 */
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      font-family: 'Nunito', Pretendard, "Noto Sans KR", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      /* 귀여운 도트 패턴 배경 추가 */
      background-image: radial-gradient(var(--line) 2px, transparent 2px);
      background-size: 30px 30px;
    }

    button,
    input {
      font: inherit;
    }

    /* 통통 튀는 입체감 있는 버튼 스타일 */
    button {
      border: 2px solid var(--line);
      border-radius: 99px;
      padding: 10px 18px;
      color: var(--text);
      background: var(--panel);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--line);
      transition: all 150ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--line);
    }

    button:active:not(:disabled) {
      transform: translateY(4px);
      box-shadow: 0 0 0 var(--line);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
      transform: translateY(4px);
      box-shadow: 0 0 0 var(--line);
    }

    button.primary {
      border-color: #f77289;
      color: #ffffff;
      background: var(--accent);
      box-shadow: 0 4px 0 #f77289;
    }

    button.primary:hover:not(:disabled) {
      box-shadow: 0 2px 0 #f77289;
    }

    button.danger {
      color: #ffffff;
      background: var(--danger);
      border-color: #e65c5c;
      box-shadow: 0 4px 0 #e65c5c;
    }

    button.danger:hover:not(:disabled) {
      box-shadow: 0 2px 0 #e65c5c;
    }

    .app {
      width: min(1440px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(340px, 0.85fr);
      gap: 20px;
      min-height: calc(100vh - 44px);
    }

    .left-column {
      display: grid;
      grid-template-rows: auto minmax(250px, 0.75fr) minmax(360px, 1.25fr);
      gap: 20px;
      min-width: 0;
    }

    /* 패널에도 귀여운 테두리와 입체감 적용 */
    .panel {
      min-width: 0;
      border: 3px solid #fff;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(255, 185, 196, 0.25), 0 0 0 2px var(--line);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 2px dashed var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 19px;
      font-weight: 800;
      color: var(--accent);
    }

    .panel-subtitle {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
    }

    .toolbar {
      padding: 20px 24px;
    }

    .toolbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
    }

    .connection-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    /* 동글동글한 뱃지 */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      color: var(--text);
      background: var(--panel-muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 0 var(--line);
    }

    .badge::before {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--line-strong);
      content: "";
    }

    .badge.connected::before,
    .badge.running::before {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .badge.paused::before {
      background: var(--warning);
      box-shadow: 0 0 6px var(--warning);
    }

    .badge.error::before,
    .badge.stopped::before {
      background: var(--danger);
      box-shadow: 0 0 6px var(--danger);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .environment-body {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 16px;
      padding: 20px 24px 24px;
    }

    /* 카드 스타일 (입체감 + 둥글게) */
    .stat-card {
      min-width: 0;
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      background: var(--panel-muted);
      box-shadow: 0 4px 0 var(--line);
      text-align: center;
      transition: transform 0.2s;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .stat-value {
      display: block;
      margin-top: 8px;
      overflow: hidden;
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .resource-block,
    .location-block {
      grid-column: 1 / -1;
      border-top: 2px dashed var(--line);
      padding-top: 20px;
    }

    .section-label {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .resource-list,
    .location-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .resource-pill,
    .location-pill {
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 8px 14px;
      background: #ffffff;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 3px 0 var(--line);
    }

    .agents-body {
      display: grid;
      grid-template-columns: repeat(3, minmax(210px, 1fr));
      align-items: start;
      gap: 16px;
      max-height: 100%;
      padding: 20px 24px 24px;
      overflow: auto;
    }

    /* 에이전트 카드 아기자기하게 */
    .agent-card {
      min-width: 0;
      border: 2px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      background: var(--panel);
      box-shadow: 0 6px 0 var(--line);
      transition: transform 0.2s;
    }

    .agent-card:hover {
      transform: translateY(-4px);
    }

    .agent-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .agent-name {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .agent-id {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
    }

    .emotion {
      border-radius: 999px;
      padding: 6px 12px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 12px;
      font-weight: 800;
      text-transform: capitalize;
    }

    .agent-meta {
      display: grid;
      grid-template-columns: 50px minmax(0, 1fr);
      gap: 6px 10px;
      margin: 16px 0;
      font-size: 13px;
      font-weight: 600;
      background: var(--panel-muted);
      padding: 12px;
      border-radius: 16px;
    }

    .agent-meta dt {
      color: var(--text-muted);
      font-weight: 700;
    }

    .agent-meta dd {
      margin: 0;
      overflow-wrap: anywhere;
      color: var(--text);
    }

    .need-row {
      margin-top: 12px;
    }

    .need-row-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .need-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--line);
    }

    .need-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      background-image: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.2) 75%, transparent 75%, transparent);
      background-size: 10px 10px;
    }

    .agent-section {
      margin-top: 18px;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: #ffffff;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .memory-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      color: var(--text-muted);
      font-size: 12px;
      list-style: none;
    }

    .memory-list li {
      position: relative;
      padding-left: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }

    .memory-list li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 16px;
      line-height: 1;
    }

    .timeline-panel {
      display: flex;
      min-height: 0;
      flex-direction: column;
    }

    .timeline-actions {
      display: flex;
      gap: 10px;
    }

    .timeline-actions button {
      padding: 8px 12px;
      font-size: 13px;
    }

    .timeline-list {
      display: flex;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      gap: 14px;
      margin: 0;
      padding: 20px 24px 24px;
      overflow: auto;
      list-style: none;
    }

    .timeline-empty,
    .empty-state {
      display: grid;
      min-height: 140px;
      place-items: center;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 700;
      background: var(--panel-muted);
      border-radius: 20px;
      border: 2px dashed var(--line);
    }

    .timeline-item {
      position: relative;
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 16px 18px 16px 24px;
      background: var(--panel);
      box-shadow: 0 4px 0 var(--line);
    }

    .timeline-item::before {
      position: absolute;
      top: 16px;
      bottom: 16px;
      left: 6px;
      width: 6px;
      border-radius: 999px;
      background: var(--line-strong);
      content: "";
    }

    /* 타임라인 카테고리별 귀여운 색상 */
    .timeline-item[data-category="AGENT"]::before {
      background: #7ca8d9;
    }
    .timeline-item[data-category="WORLD"]::before {
      background: var(--success);
    }
    .timeline-item[data-category="RESOURCE"]::before {
      background: var(--warning);
    }
    .timeline-item[data-category="RELATIONSHIP"]::before {
      background: #d988b1;
    }

    .timeline-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .timeline-category {
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: var(--accent-soft);
      padding: 4px 8px;
      border-radius: 8px;
    }

    .timeline-time {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
    }

    .timeline-title {
      margin: 0 0 6px;
      font-size: 15px;
      font-weight: 800;
    }

    .timeline-summary {
      margin: 0;
      color: #635356;
      font-size: 13px;
      line-height: 1.6;
      font-weight: 600;
    }

    .timeline-footer {
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      background: var(--panel-muted);
      padding: 6px 10px;
      border-radius: 8px;
      display: inline-block;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 10;
      max-width: min(420px, calc(100vw - 48px));
      border: 2px solid var(--danger);
      border-radius: 16px;
      padding: 14px 18px;
      color: #fff;
      background: var(--danger);
      box-shadow: 0 8px 20px rgba(255, 118, 118, 0.3);
      font-size: 14px;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1050px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .timeline-panel {
        min-height: 520px;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 16px;
      }

      .left-column {
        grid-template-rows: auto auto auto;
      }

      .toolbar-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .connection-group {
        justify-content: flex-start;
      }

      .environment-body {
        grid-template-columns: repeat(2, minmax(110px, 1fr));
      }

      .agents-body {
        grid-template-columns: 1fr;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="layout">
      <section class="left-column">
        <section class="panel toolbar" aria-labelledby="toolbar-title">
          <div class="toolbar-top">
            <div class="brand">
              <h1 id="toolbar-title">ATM Terrarium</h1>
              <p id="simulation-label">simulation: atm-demo</p>
            </div>
            <div class="connection-group">
              <span id="rest-status" class="badge">REST 확인 중</span>
              <span id="ws-status" class="badge">Timeline 연결 전</span>
              <span id="simulation-status" class="badge">상태 없음</span>
            </div>
          </div>
          <div class="controls" aria-label="시뮬레이션 제어">
            <button id="start-button" class="primary" data-action="start">시작</button>
            <button id="pause-button" data-action="pause">일시 정지</button>
            <button id="resume-button" data-action="resume">재개</button>
            <button id="tick-button" data-action="tick">1 Tick</button>
            <button id="refresh-button" data-action="refresh">상태 새로고침</button>
            <button id="stop-button" class="danger" data-action="stop">종료</button>
          </div>
        </section>

        <section class="panel" aria-labelledby="environment-title">
          <header class="panel-header">
            <div>
              <h2 id="environment-title" class="panel-title">환경 및 자원 상태</h2>
              <p class="panel-subtitle">REST API를 2초마다 조회해 갱신합니다.</p>
            </div>
            <span id="updated-at" class="badge">갱신 전</span>
          </header>
          <div id="environment" class="environment-body">
            <div class="empty-state">상태 데이터를 기다리는 중입니다.</div>
          </div>
        </section>

        <section class="panel" aria-labelledby="agents-title">
          <header class="panel-header">
            <div>
              <h2 id="agents-title" class="panel-title">Agent 정보</h2>
              <p class="panel-subtitle">위치, 감정, 욕구, 관계와 최근 기억을 표시합니다.</p>
            </div>
            <span id="agent-count" class="badge">0 agents</span>
          </header>
          <div id="agents" class="agents-body">
            <div class="empty-state">Agent 데이터를 기다리는 중입니다.</div>
          </div>
        </section>
      </section>

      <aside class="panel timeline-panel" aria-labelledby="timeline-title">
        <header class="panel-header">
          <div>
            <h2 id="timeline-title" class="panel-title">타임라인</h2>
            <p class="panel-subtitle">초기 기록은 REST로 불러오고 신규 이벤트는 WebSocket으로 수신합니다.</p>
          </div>
          <div class="timeline-actions">
            <button id="reload-timeline-button" type="button">다시 불러오기</button>
            <button id="clear-timeline-button" type="button">화면 비우기</button>
          </div>
        </header>
        <ol id="timeline" class="timeline-list">
          <li class="timeline-empty">아직 발생한 이벤트가 없습니다.</li>
        </ol>
      </aside>
    </div>
  </main>

  <div id="toast" class="toast hidden" role="alert"></div>

  <script>
    const query = new URLSearchParams(window.location.search);
    const API_BASE = (query.get('api') || 'http://localhost:9571').replace(/\/$/, '');
    const INITIAL_SIMULATION_ID = query.get('simulation') || null;
    const STATE_POLL_INTERVAL_MS = 2000;
    const MAX_TIMELINE_ITEMS = 200;

    const elements = {
      restStatus: document.getElementById('rest-status'),
      wsStatus: document.getElementById('ws-status'),
      simulationStatus: document.getElementById('simulation-status'),
      simulationLabel: document.getElementById('simulation-label'),
      updatedAt: document.getElementById('updated-at'),
      environment: document.getElementById('environment'),
      agents: document.getElementById('agents'),
      agentCount: document.getElementById('agent-count'),
      timeline: document.getElementById('timeline'),
      toast: document.getElementById('toast'),
      buttons: {
        start: document.getElementById('start-button'),
        pause: document.getElementById('pause-button'),
        resume: document.getElementById('resume-button'),
        tick: document.getElementById('tick-button'),
        refresh: document.getElementById('refresh-button'),
        stop: document.getElementById('stop-button'),
      },
    };

    const timelineItems = [];
    const timelineIds = new Set();

    let simulationId = INITIAL_SIMULATION_ID;
    let currentState = null;
    let statePollTimer = null;
    let websocket = null;
    let websocketSimulationId = null;
    let reconnectTimer = null;
    let toastTimer = null;
    let intentionalWsClose = false;
    let createSimulationPromise = null;

    function apiPath(path = '') {
      if (!simulationId) {
        throw new Error('활성화된 시뮬레이션 세션이 없습니다.');
      }
      return `${API_BASE}/api/v1/terrarium/${encodeURIComponent(simulationId)}${path}`;
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
        cache: 'no-store',
        ...options,
      });

      const rawBody = await response.text();
      let payload = null;
      if (rawBody) {
        try {
          payload = JSON.parse(rawBody);
        } catch (_) {
          payload = null;
        }
      }

      if (!response.ok) {
        const detail = payload?.detail
          || payload?.message
          || rawBody
          || `${response.status} ${response.statusText}`;
        const error = new Error(
          typeof detail === 'string' ? detail : JSON.stringify(detail),
        );
        error.status = response.status;
        error.payload = payload;
        error.responseBody = rawBody;
        throw error;
      }

      return payload;
    }

    function setSimulationId(nextSimulationId) {
      simulationId = nextSimulationId || null;

      // file:// 문서는 고유 origin으로 취급되어 history.replaceState가
      // SecurityError를 발생시킬 수 있으므로 메모리 상태만 갱신합니다.
      if (window.location.protocol === 'file:') {
        return;
      }

      const url = new URL(window.location.href);
      if (simulationId) {
        url.searchParams.set('simulation', simulationId);
      } else {
        url.searchParams.delete('simulation');
      }
      window.history.replaceState({}, '', url);
    }

    async function createSimulation() {
      // 더블 클릭이나 중복 이벤트 등록으로 생성 요청이 겹치지 않도록
      // 같은 Promise를 공유합니다.
      if (createSimulationPromise) {
        return createSimulationPromise;
      }

      createSimulationPromise = (async () => {
        const payload = await requestJson(`${API_BASE}/api/v1/terrarium`, {
          method: 'POST',
          body: JSON.stringify({
            simulation_id: null,
            name: 'ATM Terrarium',
          }),
        });

        const state = payload?.data;
        if (!state?.simulation_id) {
          throw new Error('새 세션 ID를 응답받지 못했습니다.');
        }

        await disconnectTimeline();
        stopStatePolling();

        setSimulationId(state.simulation_id);
        currentState = state;
        replaceTimeline([]);
        renderState(state);

        await connectTimeline();
        await loadTimeline({ silent: true });
        startStatePolling();

        return state;
      })();

      try {
        return await createSimulationPromise;
      } finally {
        createSimulationPromise = null;
      }
    }

    async function startSimulation() {
      const status = String(currentState?.status || '').toUpperCase();
      const requiresNewSession = !simulationId || !currentState || status === 'STOPPED';

      if (requiresNewSession) {
        await createSimulation();
      } else {
        await connectTimeline();
        startStatePolling();
      }

      const payload = await requestJson(apiPath('/start'), { method: 'POST' });
      currentState = payload.data;
      renderState(currentState);
      await loadState({ silent: true });
      await loadTimeline({ silent: true });
    }

    async function loadState({ silent = false, clearMissingSession = false } = {}) {
      if (!simulationId) {
        return null;
      }

      try {
        const payload = await requestJson(apiPath('/state'));
        currentState = payload.data;
        setRestStatus('REST 연결됨', 'connected');
        renderState(currentState);
        return currentState;
      } catch (error) {
        if (error.status === 404 && clearMissingSession) {
          await resetToIdle();
          return null;
        }

        setRestStatus('REST 연결 오류', 'error');
        if (!silent) {
          showError(error);
        }
        return null;
      }
    }

    async function loadTimeline({ silent = false } = {}) {
      if (!simulationId) {
        replaceTimeline([]);
        return;
      }

      try {
        const payload = await requestJson(apiPath('/timeline?limit=200'));
        replaceTimeline(Array.isArray(payload.data) ? payload.data : []);
      } catch (error) {
        if (!silent) {
          showError(error);
        }
      }
    }

    async function controlSimulation(action) {
      if (action === 'start') {
        setButtonsBusy(true);
        try {
          await startSimulation();
        } catch (error) {
          showError(error);
        } finally {
          setButtonsBusy(false);
        }
        return;
      }

      if (action === 'refresh') {
        if (!simulationId) {
          return;
        }
        await Promise.all([loadState(), loadTimeline({ silent: true })]);
        return;
      }

      if (!simulationId || !currentState) {
        showError(new Error('먼저 시작 버튼을 눌러 세션을 생성하세요.'));
        return;
      }

      setButtonsBusy(true);
      try {
        const payload = await requestJson(apiPath(`/${action}`), { method: 'POST' });
        if (payload?.data) {
          currentState = payload.data;
          renderState(currentState);
        }

        if (action === 'stop') {
          await loadTimeline({ silent: true });
          stopStatePolling();
          window.setTimeout(() => disconnectTimeline(), 150);
        } else {
          await loadState({ silent: true });
          startStatePolling();
        }
      } catch (error) {
        showError(error);
      } finally {
        setButtonsBusy(false);
      }
    }

    function connectTimeline() {
      if (!simulationId) {
        return Promise.resolve();
      }

      if (
        websocket
        && websocketSimulationId === simulationId
        && [WebSocket.OPEN, WebSocket.CONNECTING].includes(websocket.readyState)
      ) {
        if (websocket.readyState === WebSocket.OPEN) {
          return Promise.resolve();
        }
        return waitForWebSocketOpen(websocket);
      }

      return disconnectTimeline().then(() => new Promise((resolve, reject) => {
        clearTimeout(reconnectTimer);
        intentionalWsClose = false;

        const targetSimulationId = simulationId;
        const wsBase = API_BASE.replace(/^http/, 'ws');
        const socket = new WebSocket(
          `${wsBase}/ws/terrarium/${encodeURIComponent(targetSimulationId)}`,
        );

        websocket = socket;
        websocketSimulationId = targetSimulationId;
        setWsStatus('Timeline 연결 중', '');

        const timeoutId = window.setTimeout(() => {
          reject(new Error('WebSocket 연결 시간이 초과되었습니다.'));
          socket.close();
        }, 5000);

        socket.onopen = () => {
          window.clearTimeout(timeoutId);
          if (targetSimulationId !== simulationId) {
            socket.close();
            return;
          }
          setWsStatus('Timeline 연결됨', 'connected');
          resolve();
        };

        socket.onmessage = (event) => {
          if (targetSimulationId !== simulationId) {
            return;
          }
          try {
            handleWsMessage(JSON.parse(event.data));
          } catch (error) {
            console.warn('Invalid WebSocket message', error);
          }
        };

        socket.onerror = () => {
          window.clearTimeout(timeoutId);
          setWsStatus('Timeline 연결 오류', 'error');
          reject(new Error('WebSocket 연결에 실패했습니다.'));
        };

        socket.onclose = () => {
          window.clearTimeout(timeoutId);
          if (websocket === socket) {
            websocket = null;
            websocketSimulationId = null;
          }

          if (intentionalWsClose || targetSimulationId !== simulationId) {
            setWsStatus('Timeline 연결 전', '');
            return;
          }

          const status = String(currentState?.status || '').toUpperCase();
          if (!simulationId || status === 'STOPPED') {
            setWsStatus('Timeline 연결 종료', '');
            return;
          }

          setWsStatus('Timeline 재연결 대기', 'error');
          reconnectTimer = window.setTimeout(() => {
            connectTimeline().catch((error) => console.warn(error));
          }, 3000);
        };
      }));
    }

    function waitForWebSocketOpen(socket) {
      return new Promise((resolve, reject) => {
        const timeoutId = window.setTimeout(
          () => reject(new Error('WebSocket 연결 시간이 초과되었습니다.')),
          5000,
        );

        socket.addEventListener('open', () => {
          window.clearTimeout(timeoutId);
          resolve();
        }, { once: true });

        socket.addEventListener('error', () => {
          window.clearTimeout(timeoutId);
          reject(new Error('WebSocket 연결에 실패했습니다.'));
        }, { once: true });
      });
    }

    async function disconnectTimeline() {
      clearTimeout(reconnectTimer);
      intentionalWsClose = true;

      const socket = websocket;
      websocket = null;
      websocketSimulationId = null;

      if (socket && [WebSocket.OPEN, WebSocket.CONNECTING].includes(socket.readyState)) {
        socket.close(1000, 'session switched');
      }

      setWsStatus('Timeline 연결 전', '');
      await Promise.resolve();
    }

    function handleWsMessage(message) {
      const messageSimulationId = message?.hd?.sid;
      if (messageSimulationId && messageSimulationId !== simulationId) {
        return;
      }

      const type = message?.hd?.type;
      const data = message?.bd?.data || {};

      if (type === 'SESSION_CONNECTED') {
        if (data.simulation) {
          currentState = data.simulation;
          renderState(currentState);
        }
        if (Array.isArray(data.recent_timeline)) {
          replaceTimeline(data.recent_timeline);
        }
        return;
      }

      if (type === 'SIMULATION_STATE' && data.simulation) {
        currentState = data.simulation;
        renderState(currentState);
        return;
      }

      if (type === 'TIMELINE_EVENT') {
        const item = data.timeline || eventToTimeline(data.event);
        if (item) {
          addTimelineItem(item, { prepend: true });
        }
        loadState({ silent: true });
      }
    }

    function eventToTimeline(event) {
      if (!event) {
        return null;
      }

      return {
        timeline_id: event.event_id,
        tick: event.tick,
        category: classifyEvent(event.type),
        source_event_type: event.type,
        title: event.type || '이벤트',
        summary: event.summary,
        actor_id: event.actor_id,
        target_id: event.target_id,
        created_at: event.created_at,
      };
    }

    function classifyEvent(type = '') {
      if (type === 'RELATIONSHIP_CHANGED') return 'RELATIONSHIP';
      if (type === 'RESOURCE_CHANGED') return 'RESOURCE';
      if (type.startsWith('AGENT_')) return 'AGENT';
      if (['WORLD_EVENT', 'NEED_CHANGED'].includes(type)) return 'WORLD';
      return 'SYSTEM';
    }

    function renderState(state) {
      if (!state) {
        renderIdleState();
        return;
      }

      const status = String(state.status || 'UNKNOWN').toUpperCase();
      elements.simulationLabel.textContent = `${state.name || 'ATM Terrarium'} · ${state.simulation_id || simulationId}`;
      const autoTickFailed = status === 'RUNNING' && state.auto_tick_active === false;
      elements.simulationStatus.textContent = status === 'RUNNING'
        ? (autoTickFailed ? 'RUNNING · AUTO OFF' : 'RUNNING · AUTO')
        : status;
      elements.simulationStatus.className = `badge ${autoTickFailed ? 'error' : status.toLowerCase()}`;
      elements.updatedAt.textContent = state.updated_at
        ? `갱신 ${formatDateTime(state.updated_at)}`
        : '갱신 시각 없음';

      renderEnvironment(state.world || {});
      renderAgents(state.agents || {}, state.world || {});
      updateButtonStates(status);
    }

    function renderIdleState() {
      elements.simulationLabel.textContent = '시작 버튼을 눌러 새 세션을 생성합니다.';
      elements.simulationStatus.textContent = '시작 대기';
      elements.simulationStatus.className = 'badge';
      elements.updatedAt.textContent = '갱신 전';
      elements.environment.innerHTML = '<div class="empty-state">아직 생성된 세션이 없습니다.</div>';
      elements.agents.innerHTML = '<div class="empty-state">시작 후 Agent 정보가 표시됩니다.</div>';
      elements.agentCount.textContent = '0 agents';
      updateButtonStates('NONE');
    }

    function renderEnvironment(world) {
      const resources = world.resources || {};
      const locations = world.locations || {};
      const agentLocations = world.agent_locations || {};
      const locationCounts = Object.values(agentLocations).reduce((counts, locationId) => {
        counts[locationId] = (counts[locationId] || 0) + 1;
        return counts;
      }, {});

      const stats = [
        ['Tick', world.tick ?? '-'],
        ['시간대', world.time_of_day || '-'],
        ['날씨', world.weather || '-'],
        ['긴장도', world.tension ?? '-'],
      ];

      elements.environment.innerHTML = stats.map(([label, value]) => `
        <article class="stat-card">
          <span class="stat-label">${escapeHtml(label)}</span>
          <strong class="stat-value">${escapeHtml(String(value))}</strong>
        </article>
      `).join('');

      const resourceEntries = Object.entries(resources);
      elements.environment.insertAdjacentHTML('beforeend', `
        <section class="resource-block">
          <h3 class="section-label">Resources</h3>
          <div class="resource-list">
            ${resourceEntries.length
              ? resourceEntries.map(([name, value]) => `<span class="resource-pill">${escapeHtml(name)} <strong>${escapeHtml(String(value))}</strong></span>`).join('')
              : '<span class="resource-pill">등록된 자원 없음</span>'}
          </div>
        </section>
      `);

      const locationEntries = Object.entries(locations);
      elements.environment.insertAdjacentHTML('beforeend', `
        <section class="location-block">
          <h3 class="section-label">Locations</h3>
          <div class="location-list">
            ${locationEntries.length
              ? locationEntries.map(([id, location]) => {
                  const name = location?.name || id;
                  const count = locationCounts[id] || 0;
                  return `<span class="location-pill">${escapeHtml(name)} · ${count} agent</span>`;
                }).join('')
              : '<span class="location-pill">등록된 장소 없음</span>'}
          </div>
        </section>
      `);
    }

    function renderAgents(agentMap, world) {
      const agents = Array.isArray(agentMap) ? agentMap : Object.values(agentMap);
      const locations = world.locations || {};
      const nameById = Object.fromEntries(agents.map((agent) => [agent.agent_id, agent.name]));

      elements.agentCount.textContent = `${agents.length} agents`;

      if (!agents.length) {
        elements.agents.innerHTML = '<div class="empty-state">등록된 Agent가 없습니다.</div>';
        return;
      }

      elements.agents.innerHTML = agents.map((agent) => {
        const location = locations[agent.location_id];
        const locationName = location?.name || agent.location_id || '-';
        const needs = Object.entries(agent.needs || {});
        const relationships = Object.entries(agent.relationships || {});
        const memories = Array.isArray(agent.memories) ? agent.memories.slice(-3).reverse() : [];

        return `
          <article class="agent-card">
            <header class="agent-card-header">
              <div>
                <h3 class="agent-name">${escapeHtml(agent.name || agent.agent_id)}</h3>
                <div class="agent-id">${escapeHtml(agent.agent_id || '-')}</div>
              </div>
              <span class="emotion">${escapeHtml(agent.current_emotion || 'neutral')}</span>
            </header>

            <dl class="agent-meta">
              <dt>위치</dt><dd>${escapeHtml(locationName)}</dd>
              <dt>목표</dt><dd>${escapeHtml(agent.goal || '-')}</dd>
            </dl>

            <section class="agent-section">
              <h4 class="section-label">Needs</h4>
              ${needs.length
                ? needs.map(([name, value]) => renderNeed(name, value)).join('')
                : '<span class="chip">상태 없음</span>'}
            </section>

            <section class="agent-section">
              <h4 class="section-label">Relationships</h4>
              <div class="chip-list">
                ${relationships.length
                  ? relationships.map(([id, value]) => `<span class="chip">${escapeHtml(nameById[id] || id)} ${formatSignedNumber(value)}</span>`).join('')
                  : '<span class="chip">관계 없음</span>'}
              </div>
            </section>

            <section class="agent-section">
              <h4 class="section-label">Recent memories</h4>
              <ul class="memory-list">
                ${memories.length
                  ? memories.map((memory) => `<li title="${escapeHtml(memory)}">${escapeHtml(memory)}</li>`).join('')
                  : '<li>아직 기억이 없습니다.</li>'}
              </ul>
            </section>
          </article>
        `;
      }).join('');
    }

    function renderNeed(name, rawValue) {
      const numeric = Number(rawValue);
      const value = Number.isFinite(numeric) ? Math.max(0, Math.min(100, numeric)) : 0;
      return `
        <div class="need-row">
          <div class="need-row-top">
            <span>${escapeHtml(name)}</span>
            <span>${escapeHtml(String(rawValue))}</span>
          </div>
          <div class="need-track"><div class="need-fill" style="width: ${value}%"></div></div>
        </div>
      `;
    }

    function replaceTimeline(items) {
      timelineItems.length = 0;
      timelineIds.clear();
      [...items].reverse().forEach((item) => addTimelineItem(item, { prepend: false, render: false }));
      renderTimeline();
    }

    function addTimelineItem(item, { prepend = true, render = true } = {}) {
      const id = item.timeline_id || item.event_id || `${item.created_at}-${item.tick}-${item.summary}`;
      if (timelineIds.has(id)) {
        return;
      }

      timelineIds.add(id);
      const normalized = { ...item, timeline_id: id };
      if (prepend) {
        timelineItems.unshift(normalized);
      } else {
        timelineItems.push(normalized);
      }

      while (timelineItems.length > MAX_TIMELINE_ITEMS) {
        const removed = timelineItems.pop();
        timelineIds.delete(removed.timeline_id);
      }

      if (render) {
        renderTimeline();
      }
    }

    function renderTimeline() {
      if (!timelineItems.length) {
        elements.timeline.innerHTML = '<li class="timeline-empty">아직 발생한 이벤트가 없습니다.</li>';
        return;
      }

      elements.timeline.innerHTML = timelineItems.map((item) => {
        const category = item.category || classifyEvent(item.source_event_type || item.type || '');
        return `
          <li class="timeline-item" data-category="${escapeHtml(category)}">
            <div class="timeline-top">
              <span class="timeline-category">${escapeHtml(category)}</span>
              <time class="timeline-time">${formatDateTime(item.created_at)}</time>
            </div>
            <h3 class="timeline-title">${escapeHtml(item.title || item.source_event_type || '이벤트')}</h3>
            <p class="timeline-summary">${escapeHtml(item.summary || '-')}</p>
            <div class="timeline-footer">Tick ${escapeHtml(String(item.tick ?? '-'))}${renderActorTarget(item)}</div>
          </li>
        `;
      }).join('');
    }

    function renderActorTarget(item) {
      const parts = [];
      if (item.actor_id) parts.push(`actor: ${escapeHtml(item.actor_id)}`);
      if (item.target_id) parts.push(`target: ${escapeHtml(item.target_id)}`);
      return parts.length ? ` · ${parts.join(' · ')}` : '';
    }

    function updateButtonStates(status) {
      const normalizedStatus = String(status || 'NONE').toUpperCase();
      const hasSession = Boolean(simulationId && currentState);
      const running = normalizedStatus === 'RUNNING';
      const paused = normalizedStatus === 'PAUSED';
      const stopped = normalizedStatus === 'STOPPED';

      elements.buttons.start.textContent = stopped ? '새 세션 시작' : '시작';
      elements.buttons.start.disabled = running || paused;
      elements.buttons.pause.disabled = !running;
      elements.buttons.resume.disabled = !paused;

      // 수동 Tick은 세션이 존재하며 종료되지 않은 모든 상태에서 허용합니다.
      // SimulationManager의 Lock이 자동 Tick과의 동시 실행을 직렬화합니다.
      elements.buttons.tick.disabled = !hasSession || stopped;
      elements.buttons.refresh.disabled = !hasSession;
      elements.buttons.stop.disabled = !hasSession || stopped;
    }

    function setButtonsBusy(busy) {
      Object.values(elements.buttons).forEach((button) => {
        button.disabled = busy;
      });
      if (!busy) {
        updateButtonStates(String(currentState?.status || 'NONE').toUpperCase());
      }
    }

    function startStatePolling() {
      if (!simulationId || statePollTimer !== null) {
        return;
      }
      statePollTimer = window.setInterval(
        () => loadState({ silent: true }),
        STATE_POLL_INTERVAL_MS,
      );
    }

    function stopStatePolling() {
      if (statePollTimer !== null) {
        window.clearInterval(statePollTimer);
        statePollTimer = null;
      }
    }

    async function resetToIdle() {
      stopStatePolling();
      await disconnectTimeline();
      setSimulationId(null);
      currentState = null;
      replaceTimeline([]);
      renderIdleState();
      setRestStatus('REST 대기', '');
    }

    function setRestStatus(text, stateClass) {
      elements.restStatus.textContent = text;
      elements.restStatus.className = `badge ${stateClass || ''}`.trim();
    }

    function setWsStatus(text, stateClass) {
      elements.wsStatus.textContent = text;
      elements.wsStatus.className = `badge ${stateClass || ''}`.trim();
    }

    function showError(error) {
      console.error(error);
      clearTimeout(toastTimer);
      elements.toast.textContent = error?.message || String(error);
      elements.toast.classList.remove('hidden');
      toastTimer = setTimeout(() => elements.toast.classList.add('hidden'), 5000);
    }

    function formatDateTime(timestamp) {
      const numeric = Number(timestamp);
      if (!Number.isFinite(numeric)) {
        return '-';
      }
      return new Intl.DateTimeFormat('ko-KR', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
      }).format(new Date(numeric));
    }

    function formatSignedNumber(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return String(value);
      return numeric > 0 ? `+${numeric}` : String(numeric);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.querySelectorAll('[data-action]').forEach((button) => {
      button.addEventListener('click', () => controlSimulation(button.dataset.action));
    });

    document.getElementById('reload-timeline-button').addEventListener('click', () => loadTimeline());
    document.getElementById('clear-timeline-button').addEventListener('click', () => replaceTimeline([]));

    async function bootstrap() {
      renderIdleState();
      setRestStatus('REST 대기', '');
      setWsStatus('Timeline 연결 전', '');

      // 쿼리스트링으로 명시된 세션은 조회만 합니다.
      // 세션이 없으면 생성하지 않으며 시작 버튼을 눌렀을 때만 새 세션을 만듭니다.
      if (!simulationId) {
        return;
      }

      const existingState = await loadState({ silent: true, clearMissingSession: true });
      if (!existingState) {
        return;
      }

      await loadTimeline({ silent: true });
      await connectTimeline();

      if (String(existingState.status || '').toUpperCase() !== 'STOPPED') {
        startStatePolling();
      }
    }

    window.addEventListener('beforeunload', () => {
      stopStatePolling();
      clearTimeout(reconnectTimer);
      intentionalWsClose = true;
      websocket?.close();
    });

    bootstrap().catch((error) => {
      setRestStatus('REST 연결 오류', 'error');
      showError(error);
    });
  </script>
</body>
</html>
