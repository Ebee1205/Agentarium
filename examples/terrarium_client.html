<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATM Terrarium</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      color-scheme: light;
      var(--bg): #fff5f5;
      --panel: #ffffff;
      --panel-muted: #fff0f2;
      --line: #ffd1d8;
      --line-strong: #ffaebc;
      --text: #5c4a4d;
      --text-muted: #9e8488;
      --accent: #ff8da1;
      --accent-soft: #ffe4e8;
      --danger: #ff7676;
      --warning: #ffbd59;
      --success: #5cdb95;
      --shadow: 0 8px 24px rgba(255, 141, 161, 0.15);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      font-family: 'Nunito', Pretendard, "Noto Sans KR", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      background-image: radial-gradient(var(--line) 2px, transparent 2px);
      background-size: 30px 30px;
    }

    button, input { font: inherit; }

    button {
      border: 2px solid var(--line);
      border-radius: 99px;
      padding: 10px 18px;
      color: var(--text);
      background: var(--panel);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--line);
      transition: all 150ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--line);
    }

    button:active:not(:disabled) {
      transform: translateY(4px);
      box-shadow: 0 0 0 var(--line);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
      transform: translateY(4px);
      box-shadow: 0 0 0 var(--line);
    }

    button.primary {
      border-color: #f77289;
      color: #ffffff;
      background: var(--accent);
      box-shadow: 0 4px 0 #f77289;
    }

    button.primary:hover:not(:disabled) { box-shadow: 0 2px 0 #f77289; }

    button.danger {
      color: #ffffff;
      background: var(--danger);
      border-color: #e65c5c;
      box-shadow: 0 4px 0 #e65c5c;
    }

    button.danger:hover:not(:disabled) { box-shadow: 0 2px 0 #e65c5c; }

    .app {
      width: min(1440px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(340px, 0.8fr);
      gap: 20px;
      min-height: calc(100vh - 44px);
    }

    .left-column {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 20px;
      min-width: 0;
    }

    .panel {
      min-width: 0;
      border: 3px solid #fff;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(255, 185, 196, 0.25), 0 0 0 2px var(--line);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 2px dashed var(--line);
    }

    .panel-title { margin: 0; font-size: 19px; font-weight: 800; color: var(--accent); }
    .panel-subtitle { margin: 4px 0 0; color: var(--text-muted); font-size: 13px; font-weight: 600; }

    .toolbar { padding: 20px 24px; }
    .toolbar-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
    .brand h1 { margin: 0; font-size: 24px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .brand p { margin: 6px 0 0; color: var(--text-muted); font-size: 14px; font-weight: 600; }
    .connection-group { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      color: var(--text);
      background: var(--panel-muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 0 var(--line);
    }

    .badge::before {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--line-strong);
      content: "";
    }

    .badge.connected::before, .badge.running::before { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .badge.paused::before { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
    .badge.error::before, .badge.stopped::before { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; }

    /* 귀여운 HUD + 게임 맵 컨테이너 */
    .game-viewport {
      position: relative;
      width: 100%;
      height: 480px;
      background: #fffcfc;
      border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 캔버스 위에 귀엽게 떠 있는 HUD 요소들 */
    .hud-overlay {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }

    .hud-top-left {
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hud-bottom {
      bottom: 20px;
      left: 20px;
      right: 20px;
    }

    .hud-tick-text {
      font-size: 26px;
      font-weight: 900;
      color: var(--accent);
      background: #ffffff;
      padding: 6px 16px;
      border-radius: 16px;
      border: 3px solid var(--line);
      box-shadow: 0 4px 0 var(--line);
      display: inline-block;
      letter-spacing: 0.5px;
    }

    .hud-env-info {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hud-env-info .hud-badge {
      background: #ffffff;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      box-shadow: 0 3px 0 var(--line);
    }

    .hud-resource-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 4px #ffffff;
    }

    .hud-resources {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hud-resource-item {
      background: #ffffff;
      border: 2px solid var(--line);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 3px 0 var(--line);
    }

    .hud-resource-item strong {
      color: var(--accent);
      margin-left: 6px;
      font-size: 15px;
    }

    /* 에이전트 목록 (말풍선 테마 복구) */
    .agents-body {
      display: grid;
      grid-template-columns: 1fr;
      align-items: start;
      gap: 20px;
      max-height: 800px;
      padding: 20px 24px 24px 34px; 
      overflow-y: auto;
    }

    .agent-card {
      position: relative;
      min-width: 0;
      border: 2px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      background: var(--panel);
      box-shadow: 0 6px 0 var(--line);
      transition: transform 0.2s;
      display: grid;
      grid-template-columns: 240px 1.2fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .agent-card::before {
      content: "";
      position: absolute;
      top: 32px;
      left: -16px;
      border-width: 12px 16px 12px 0;
      border-style: solid;
      border-color: transparent var(--line) transparent transparent;
    }

    .agent-card::after {
      content: "";
      position: absolute;
      top: 32px;
      left: -12px;
      border-width: 12px 16px 12px 0;
      border-style: solid;
      border-color: transparent var(--panel) transparent transparent;
    }

    .agent-card:hover { transform: translateY(-2px); }

    .agent-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .agent-name { margin: 0; font-size: 18px; font-weight: 800; }
    .agent-id { margin-top: 4px; color: var(--text-muted); font-size: 12px; font-weight: 600; }
    .emotion { border-radius: 999px; padding: 6px 12px; color: var(--accent); background: var(--accent-soft); font-size: 12px; font-weight: 800; text-transform: capitalize; }
    
    .agent-meta { display: grid; grid-template-columns: 50px minmax(0, 1fr); gap: 6px 10px; margin: 16px 0 0; font-size: 13px; font-weight: 600; background: var(--panel-muted); padding: 12px; border-radius: 16px; }
    .agent-meta dt { color: var(--text-muted); font-weight: 700; }
    .agent-meta dd { margin: 0; overflow-wrap: anywhere; color: var(--text); }
    
    .need-row { margin-top: 12px; }
    .need-row-top { display: flex; justify-content: space-between; margin-bottom: 6px; color: var(--text-muted); font-size: 12px; font-weight: 700; }
    .need-track { height: 10px; overflow: hidden; border-radius: 999px; background: var(--line); }
    .need-fill { height: 100%; border-radius: inherit; background: var(--accent); background-image: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.2) 75%, transparent 75%, transparent); background-size: 10px 10px; }
    
    .agent-section { margin-bottom: 20px; }
    .section-label { margin: 0 0 12px; color: var(--accent); font-size: 14px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
    .chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { border: 2px solid var(--line); border-radius: 999px; padding: 6px 10px; background: #ffffff; font-size: 11px; font-weight: 700; color: var(--text); }
    .memory-list { display: grid; gap: 8px; margin: 0; padding: 0; color: var(--text-muted); font-size: 13px; list-style: none; }
    .memory-list li { position: relative; padding-left: 14px; margin-bottom: 6px; line-height: 1.5; font-weight: 600; word-break: keep-all; }
    .memory-list li::before { content: "•"; position: absolute; left: 0; color: var(--accent); font-size: 16px; line-height: 1; }

    /* 타임라인 */
    .timeline-panel { display: flex; flex-direction: column; height: calc(100vh - 44px); position: sticky; top: 22px; }
    .timeline-actions { display: flex; gap: 10px; }
    .timeline-actions button { padding: 8px 12px; font-size: 13px; }
    .timeline-footer-actions { display: flex; justify-content: center; padding: 16px 24px 20px; border-top: 2px dashed var(--line); }
    .timeline-footer-actions button { width: 100%; }
    .timeline-list { flex: 1; display: flex; flex-direction: column; gap: 14px; margin: 0; padding: 20px 24px 24px; overflow-y: auto; list-style: none; }
    .timeline-empty, .empty-state { display: grid; min-height: 140px; place-items: center; color: var(--text-muted); font-size: 14px; font-weight: 700; background: var(--panel-muted); border-radius: 20px; border: 2px dashed var(--line); }
    
    .timeline-item { position: relative; border: 2px solid var(--line); border-radius: 20px; padding: 16px 18px 16px 24px; background: var(--panel); box-shadow: 0 4px 0 var(--line); }
    .timeline-item::before { position: absolute; top: 16px; bottom: 16px; left: 6px; width: 6px; border-radius: 999px; background: var(--line-strong); content: ""; }
    .timeline-item[data-category="AGENT"]::before { background: #7ca8d9; }
    .timeline-item[data-category="WORLD"]::before { background: var(--success); }
    .timeline-item[data-category="RESOURCE"]::before { background: var(--warning); }
    .timeline-item[data-category="RELATIONSHIP"]::before { background: #d988b1; }

    .timeline-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .timeline-category { color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: 0.05em; background: var(--accent-soft); padding: 4px 8px; border-radius: 8px; }
    .timeline-time { color: var(--text-muted); font-size: 11px; font-weight: 600; }
    .timeline-title { margin: 0 0 6px; font-size: 15px; font-weight: 800; }
    .timeline-summary { margin: 0; color: #635356; font-size: 13px; line-height: 1.6; font-weight: 600; }
    .timeline-footer { margin-top: 10px; color: var(--text-muted); font-size: 11px; font-weight: 700; background: var(--panel-muted); padding: 6px 10px; border-radius: 8px; display: inline-block; }

    .toast { position: fixed; right: 24px; bottom: 24px; z-index: 100; max-width: min(420px, calc(100vw - 48px)); border: 2px solid var(--danger); border-radius: 16px; padding: 14px 18px; color: #fff; background: var(--danger); box-shadow: 0 8px 20px rgba(255, 118, 118, 0.3); font-size: 14px; font-weight: 700; }
    .hidden { display: none; }

    @media (max-width: 1150px) { .agent-card { grid-template-columns: 1fr; gap: 16px; } }
    @media (max-width: 1050px) { .layout { grid-template-columns: 1fr; } .timeline-panel { height: 600px; position: relative; top: 0; } }
    @media (max-width: 760px) { .app { padding: 16px; } .left-column { grid-template-rows: auto auto 1fr; } .toolbar-top { align-items: flex-start; flex-direction: column; } .connection-group { justify-content: flex-start; } .agents-body { padding-left: 24px; } .agent-card::before, .agent-card::after { display: none; } }
  </style>
</head>
<body>
  <main class="app">
    <div class="layout">
      <section class="left-column">
        <!-- 상단 툴바 -->
        <section class="panel toolbar" aria-labelledby="toolbar-title">
          <div class="toolbar-top">
            <div class="brand">
              <h1 id="toolbar-title">ATM Terrarium</h1>
              <p id="simulation-label">simulation: atm-demo</p>
            </div>
            <div class="connection-group">
              <span id="rest-status" class="badge">REST 확인 중</span>
              <span id="ws-status" class="badge">Timeline 연결 전</span>
              <span id="simulation-status" class="badge">상태 없음</span>
            </div>
          </div>
          <div class="controls" aria-label="시뮬레이션 제어">
            <button id="start-button" class="primary" data-action="start">시작</button>
            <button id="pause-button" data-action="pause">일시 정지</button>
            <button id="resume-button" data-action="resume">재개</button>
            <button id="tick-button" data-action="tick">1 Tick</button>
            <button id="refresh-button" data-action="refresh">상태 새로고침</button>
            <button id="stop-button" class="danger" data-action="stop">종료</button>
          </div>
        </section>

        <!-- 귀여운 테마의 게임 뷰포트 (맵 + HUD 오버레이) -->
        <section class="panel" aria-labelledby="map-title">
          <header class="panel-header" style="border-bottom: none; padding-bottom: 0;">
            <div>
              <h2 id="map-title" class="panel-title">World Map</h2>
              <p class="panel-subtitle">에이전트 이동 및 실시간 상태 모니터링</p>
            </div>
          </header>
          
          <div class="game-viewport" style="margin-top: 16px;">
            <!-- 상단 좌측 귀여운 뱃지 HUD -->
            <div class="hud-overlay hud-top-left">
              <div id="hud-tick" class="hud-tick-text">TICK -</div>
              <div class="hud-env-info">
                <span id="hud-time-weather" class="hud-badge">☀️ 낮 ∙ 맑음</span>
                <span id="hud-tension" class="hud-badge">긴장도: -</span>
              </div>
            </div>

            <!-- 하단 귀여운 자원 필(Pill) -->
            <div class="hud-overlay hud-bottom">
              <div class="hud-resource-label">보유 자원</div>
              <div id="resources-container" class="hud-resources">
                <div class="hud-resource-item">대기 중...</div>
              </div>
            </div>

            <!-- 캔버스 맵 -->
            <canvas id="game-canvas" width="900" height="480">캔버스를 지원하지 않는 브라우저입니다.</canvas>
          </div>
        </section>

        <!-- Agent 정보 패널 (말풍선 디자인) -->
        <section class="panel" aria-labelledby="agents-title">
          <header class="panel-header">
            <div>
              <h2 id="agents-title" class="panel-title">Agent Data</h2>
              <p class="panel-subtitle">개체별 현재 상태와 기억 로그</p>
            </div>
            <span id="agent-count" class="badge">0 agents</span>
          </header>
          <div id="agents" class="agents-body">
            <div class="empty-state">Agent 데이터를 기다리는 중입니다.</div>
          </div>
        </section>
      </section>

      <!-- 우측 타임라인 패널 -->
      <aside class="panel timeline-panel" aria-labelledby="timeline-title">
        <header class="panel-header">
          <div>
            <h2 id="timeline-title" class="panel-title">Event Log</h2>
            <p class="panel-subtitle">월드에서 발생한 주요 사건 기록</p>
          </div>
          <div class="timeline-actions">
            <button id="clear-timeline-button" type="button">비우기</button>
          </div>
        </header>
        <ol id="timeline" class="timeline-list">
          <li class="timeline-empty">아직 발생한 이벤트가 없습니다.</li>
        </ol>
        <div class="timeline-footer-actions">
          <button id="download-timeline-button" class="primary" type="button">전체 로그 저장</button>
        </div>
      </aside>
    </div>
  </main>

  <div id="toast" class="toast hidden" role="alert"></div>

  <script>
    const query = new URLSearchParams(window.location.search);
    const API_BASE = (query.get('api') || 'http://localhost:9571').replace(/\/$/, '');
    const INITIAL_SIMULATION_ID = query.get('simulation') || null;
    const STATE_POLL_INTERVAL_MS = 2000;
    const MAX_TIMELINE_ITEMS = 200;

    const elements = {
      restStatus: document.getElementById('rest-status'),
      wsStatus: document.getElementById('ws-status'),
      simulationStatus: document.getElementById('simulation-status'),
      simulationLabel: document.getElementById('simulation-label'),
      hudTick: document.getElementById('hud-tick'),
      hudTension: document.getElementById('hud-tension'),
      hudTimeWeather: document.getElementById('hud-time-weather'),
      resources: document.getElementById('resources-container'),
      canvas: document.getElementById('game-canvas'),
      agents: document.getElementById('agents'),
      agentCount: document.getElementById('agent-count'),
      timeline: document.getElementById('timeline'),
      toast: document.getElementById('toast'),
      buttons: {
        start: document.getElementById('start-button'),
        pause: document.getElementById('pause-button'),
        resume: document.getElementById('resume-button'),
        tick: document.getElementById('tick-button'),
        refresh: document.getElementById('refresh-button'),
        stop: document.getElementById('stop-button'),
      },
    };

    const timelineItems = [];
    const timelineIds = new Set();
    const mapLocationCoords = {}; 

    let simulationId = INITIAL_SIMULATION_ID;
    let currentState = null;
    let statePollTimer = null;
    let websocket = null;
    let websocketSimulationId = null;
    let reconnectTimer = null;
    let toastTimer = null;
    let intentionalWsClose = false;
    let createSimulationPromise = null;

    function apiPath(path = '') {
      if (!simulationId) { throw new Error('활성화된 시뮬레이션 세션이 없습니다.'); }
      return `${API_BASE}/api/v1/terrarium/${encodeURIComponent(simulationId)}${path}`;
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        cache: 'no-store',
        ...options,
      });
      const rawBody = await response.text();
      let payload = null;
      if (rawBody) { try { payload = JSON.parse(rawBody); } catch (_) { payload = null; } }
      if (!response.ok) {
        const detail = payload?.detail || payload?.message || rawBody || `${response.status} ${response.statusText}`;
        const error = new Error(typeof detail === 'string' ? detail : JSON.stringify(detail));
        error.status = response.status; error.payload = payload; error.responseBody = rawBody;
        throw error;
      }
      return payload;
    }

    function setSimulationId(nextSimulationId) {
      simulationId = nextSimulationId || null;
      if (window.location.protocol === 'file:') return;
      const url = new URL(window.location.href);
      if (simulationId) { url.searchParams.set('simulation', simulationId); } 
      else { url.searchParams.delete('simulation'); }
      window.history.replaceState({}, '', url);
    }

    async function createSimulation() {
      if (createSimulationPromise) return createSimulationPromise;
      createSimulationPromise = (async () => {
        const payload = await requestJson(`${API_BASE}/api/v1/terrarium`, {
          method: 'POST', body: JSON.stringify({ simulation_id: null, name: 'ATM Terrarium' }),
        });
        const state = payload?.data;
        if (!state?.simulation_id) throw new Error('새 세션 ID를 응답받지 못했습니다.');
        await disconnectTimeline(); stopStatePolling();
        setSimulationId(state.simulation_id); currentState = state;
        replaceTimeline([]); renderState(state);
        await connectTimeline(); await loadTimeline({ silent: true }); startStatePolling();
        return state;
      })();
      try { return await createSimulationPromise; } 
      finally { createSimulationPromise = null; }
    }

    async function startSimulation() {
      const status = String(currentState?.status || '').toUpperCase();
      const requiresNewSession = !simulationId || !currentState || status === 'STOPPED';
      if (requiresNewSession) { await createSimulation(); } 
      else { await connectTimeline(); startStatePolling(); }
      const payload = await requestJson(apiPath('/start'), { method: 'POST' });
      currentState = payload.data;
      renderState(currentState); await loadState({ silent: true }); await loadTimeline({ silent: true });
    }

    async function loadState({ silent = false, clearMissingSession = false } = {}) {
      if (!simulationId) return null;
      try {
        const payload = await requestJson(apiPath('/state'));
        currentState = payload.data;
        setRestStatus('REST 연결됨', 'connected');
        renderState(currentState);
        return currentState;
      } catch (error) {
        if (error.status === 404 && clearMissingSession) { await resetToIdle(); return null; }
        setRestStatus('REST 오류', 'error');
        if (!silent) showError(error);
        return null;
      }
    }

    async function loadTimeline({ silent = false } = {}) {
      if (!simulationId) { replaceTimeline([]); return; }
      try {
        const payload = await requestJson(apiPath('/timeline?limit=200'));
        replaceTimeline(Array.isArray(payload.data) ? payload.data : []);
      } catch (error) { if (!silent) showError(error); }
    }

    async function controlSimulation(action) {
      if (action === 'start') {
        setButtonsBusy(true);
        try { await startSimulation(); } catch (error) { showError(error); } finally { setButtonsBusy(false); }
        return;
      }
      if (action === 'refresh') {
        if (!simulationId) return;
        await Promise.all([loadState(), loadTimeline({ silent: true })]);
        return;
      }
      if (!simulationId || !currentState) { showError(new Error('세션을 먼저 생성하세요.')); return; }
      setButtonsBusy(true);
      try {
        const payload = await requestJson(apiPath(`/${action}`), { method: 'POST' });
        if (payload?.data) { currentState = payload.data; renderState(currentState); }
        if (action === 'stop') {
          await loadTimeline({ silent: true }); stopStatePolling();
          window.setTimeout(() => disconnectTimeline(), 150);
        } else {
          await loadState({ silent: true }); startStatePolling();
        }
      } catch (error) { showError(error); } finally { setButtonsBusy(false); }
    }

    function connectTimeline() {
      if (!simulationId) return Promise.resolve();
      if (websocket && websocketSimulationId === simulationId && [WebSocket.OPEN, WebSocket.CONNECTING].includes(websocket.readyState)) {
        if (websocket.readyState === WebSocket.OPEN) return Promise.resolve();
        return waitForWebSocketOpen(websocket);
      }
      return disconnectTimeline().then(() => new Promise((resolve, reject) => {
        clearTimeout(reconnectTimer); intentionalWsClose = false;
        const targetSimulationId = simulationId;
        const wsBase = API_BASE.replace(/^http/, 'ws');
        const socket = new WebSocket(`${wsBase}/ws/terrarium/${encodeURIComponent(targetSimulationId)}`);
        websocket = socket; websocketSimulationId = targetSimulationId;
        setWsStatus('연결 중', '');
        const timeoutId = window.setTimeout(() => { reject(new Error('WebSocket timeout')); socket.close(); }, 5000);
        socket.onopen = () => {
          window.clearTimeout(timeoutId);
          if (targetSimulationId !== simulationId) { socket.close(); return; }
          setWsStatus('연결됨', 'connected'); resolve();
        };
        socket.onmessage = (event) => {
          if (targetSimulationId !== simulationId) return;
          try { handleWsMessage(JSON.parse(event.data)); } catch (e) { }
        };
        socket.onerror = () => { window.clearTimeout(timeoutId); setWsStatus('오류', 'error'); reject(new Error('WS 연결 실패')); };
        socket.onclose = () => {
          window.clearTimeout(timeoutId);
          if (websocket === socket) { websocket = null; websocketSimulationId = null; }
          if (intentionalWsClose || targetSimulationId !== simulationId) { setWsStatus('연결 전', ''); return; }
          const status = String(currentState?.status || '').toUpperCase();
          if (!simulationId || status === 'STOPPED') { setWsStatus('종료', ''); return; }
          setWsStatus('재연결 대기', 'error');
          reconnectTimer = window.setTimeout(() => { connectTimeline().catch(() => {}); }, 3000);
        };
      }));
    }

    function waitForWebSocketOpen(socket) {
      return new Promise((resolve, reject) => {
        const timeoutId = window.setTimeout(() => reject(new Error('Timeout')), 5000);
        socket.addEventListener('open', () => { window.clearTimeout(timeoutId); resolve(); }, { once: true });
        socket.addEventListener('error', () => { window.clearTimeout(timeoutId); reject(new Error('Failed')); }, { once: true });
      });
    }

    async function disconnectTimeline() {
      clearTimeout(reconnectTimer); intentionalWsClose = true;
      const socket = websocket; websocket = null; websocketSimulationId = null;
      if (socket && [WebSocket.OPEN, WebSocket.CONNECTING].includes(socket.readyState)) socket.close(1000, 'session switched');
      setWsStatus('연결 전', ''); await Promise.resolve();
    }

    function handleWsMessage(message) {
      const messageSimulationId = message?.hd?.sid;
      if (messageSimulationId && messageSimulationId !== simulationId) return;
      const type = message?.hd?.type; const data = message?.bd?.data || {};
      if (type === 'SESSION_CONNECTED') {
        if (data.simulation) { currentState = data.simulation; renderState(currentState); }
        if (Array.isArray(data.recent_timeline)) replaceTimeline(data.recent_timeline);
        return;
      }
      if (type === 'SIMULATION_STATE' && data.simulation) { currentState = data.simulation; renderState(currentState); return; }
      if (type === 'TIMELINE_EVENT') {
        const item = data.timeline || eventToTimeline(data.event);
        if (item) addTimelineItem(item, { prepend: true });
        loadState({ silent: true });
      }
    }

    function eventToTimeline(event) {
      if (!event) return null;
      return { timeline_id: event.event_id, tick: event.tick, category: classifyEvent(event.type), source_event_type: event.type, title: event.type || '이벤트', summary: event.summary, actor_id: event.actor_id, target_id: event.target_id, created_at: event.created_at };
    }

    function classifyEvent(type = '') {
      if (type === 'RELATIONSHIP_CHANGED') return 'RELATIONSHIP';
      if (type === 'RESOURCE_CHANGED') return 'RESOURCE';
      if (type.startsWith('AGENT_')) return 'AGENT';
      if (['WORLD_EVENT', 'NEED_CHANGED'].includes(type)) return 'WORLD';
      return 'SYSTEM';
    }

    function renderState(state) {
      if (!state) { renderIdleState(); return; }
      const status = String(state.status || 'UNKNOWN').toUpperCase();
      elements.simulationLabel.textContent = `${state.name || 'ATM Terrarium'} · ${state.simulation_id || simulationId}`;
      const autoTickFailed = status === 'RUNNING' && state.auto_tick_active === false;
      elements.simulationStatus.textContent = status === 'RUNNING' ? (autoTickFailed ? 'RUNNING(AUTO OFF)' : 'RUNNING') : status;
      elements.simulationStatus.className = `badge ${autoTickFailed ? 'error' : status.toLowerCase()}`;

      const agentsArray = Array.isArray(state.agents) ? state.agents : Object.values(state.agents || {});
      renderWorldGameMap(state.world || {}, agentsArray);
      renderAgents(agentsArray, state.world || {});
      updateButtonStates(status);
    }

    function renderIdleState() {
      elements.simulationLabel.textContent = '대기 중';
      elements.simulationStatus.textContent = '시작 대기';
      elements.simulationStatus.className = 'badge';
      elements.hudTick.textContent = 'TICK -';
      elements.hudTension.textContent = '긴장도: -';
      elements.hudTimeWeather.textContent = "시간대/날씨 정보 없음";
      elements.resources.innerHTML = '<div class="hud-resource-item">생성 대기 중</div>';
      elements.agents.innerHTML = '<div class="empty-state">시작 후 Agent 정보가 표시됩니다.</div>';
      elements.agentCount.textContent = '0 agents';
      
      const ctx = elements.canvas.getContext('2d');
      ctx.clearRect(0, 0, elements.canvas.width, elements.canvas.height);
      updateButtonStates('NONE');
    }

    function getTimeIcon(timeOfDay) {
      const t = String(timeOfDay || '').toLowerCase();
      if (t.includes('dawn') || t.includes('새벽')) return '🌅';
      if (t.includes('morning') || t.includes('아침')) return '🌤️';
      if (t.includes('noon') || t.includes('낮') || t.includes('점심')) return '☀️';
      if (t.includes('afternoon') || t.includes('오후')) return '🌇';
      if (t.includes('evening') || t.includes('저녁')) return '🌆';
      if (t.includes('midnight') || t.includes('자정')) return '🌌';
      if (t.includes('night') || t.includes('밤')) return '🌙';
      return '🕐';
    }

    function getWeatherIcon(weather) {
      const w = String(weather || '').toLowerCase();
      if (w.includes('storm') || w.includes('뇌우') || w.includes('폭풍')) return '⛈️';
      if (w.includes('rain') || w.includes('비')) return '🌧️';
      if (w.includes('snow') || w.includes('눈')) return '❄️';
      if (w.includes('fog') || w.includes('안개')) return '🌫️';
      if (w.includes('wind') || w.includes('바람')) return '🌬️';
      if (w.includes('cloud') || w.includes('구름') || w.includes('흐림')) return '☁️';
      if (w.includes('sun') || w.includes('맑') || w.includes('clear')) return '☀️';
      return '🌈';
    }

    function getLocationIcon(name) {
      const n = String(name || '').toLowerCase();
      if (n.includes('집') || n.includes('거주')) return '🏠';
      if (n.includes('연못') || n.includes('물')) return '💧';
      if (n.includes('보관') || n.includes('창고')) return '📦';
      if (n.includes('장벽') || n.includes('외곽')) return '🧱';
      if (n.includes('바위') || n.includes('관측')) return '🪨';
      return '📍';
    }

    // 맵 렌더링 - 뽀짝뽀짝 귀여운 테마 캔버스
    function renderWorldGameMap(world, agents) {
      // 1. HUD 업데이트 (HTML 뱃지)
      elements.hudTick.textContent = `TICK ${world.tick ?? '-'}`;
      elements.hudTension.textContent = `긴장도: ${world.tension ?? '-'}`;
      elements.hudTimeWeather.textContent = `${getTimeIcon(world.time_of_day)} ${world.time_of_day || '-'} ∙ ${getWeatherIcon(world.weather)} ${world.weather || '-'}`;

      const resources = world.resources || {};
      const resourceEntries = Object.entries(resources);
      if (resourceEntries.length > 0) {
        elements.resources.innerHTML = resourceEntries.map(([name, value]) => `
          <div class="hud-resource-item">${escapeHtml(name)}<strong>${escapeHtml(String(value))}</strong></div>
        `).join('');
      } else {
        elements.resources.innerHTML = '<div class="hud-resource-item">자원 없음</div>';
      }

      // 2. 캔버스 그리기 (파스텔 & 귀여운 패턴)
      const canvas = elements.canvas;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;

      // 캔버스 배경 (크림색 바탕)
      ctx.fillStyle = '#fffcfc'; 
      ctx.fillRect(0, 0, width, height);

      // 귀여운 도트 느낌 그리드
      ctx.strokeStyle = '#fff0f2'; 
      ctx.lineWidth = 2;
      for (let i = 0; i < width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke(); }
      for (let i = 0; i < height; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke(); }

      // 기본 장소 파스텔 컬러
      const BASE_LOCATIONS = {
        'home': { x: 200, y: 160, name: '거주지', stroke: '#a8e6cf' }, // 민트
        'pond': { x: 700, y: 160, name: '깊은 연못', stroke: '#a1c4fd' }, // 파스텔 블루
        'observation_rock': { x: 450, y: 240, name: '높은 바위', stroke: '#dcdde1' }, // 라이트 그레이
        'storage': { x: 250, y: 360, name: '식량 보관소', stroke: '#ffdfba' }, // 파스텔 오렌지
        'boundary_wall': { x: 650, y: 360, name: '외곽 투명 장벽', stroke: '#f8cdda' } // 파스텔 핑크
      };

      const locations = world.locations || {};
      const locKeys = Object.keys(locations);

      locKeys.forEach((key, index) => {
        if (!mapLocationCoords[key]) {
          if (BASE_LOCATIONS[key]) {
            mapLocationCoords[key] = BASE_LOCATIONS[key];
          } else {
            const cx = width / 2; const cy = height / 2;
            const radius = 160; const angle = (index / Math.max(1, locKeys.length)) * Math.PI * 2;
            mapLocationCoords[key] = {
              x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius,
              name: locations[key].name || key, stroke: '#ffd1d8' // 디폴트 파스텔 핑크
            };
          }
        }
      });

      // 장소 간 귀여운 연결선 (점선)
      ctx.save();
      ctx.strokeStyle = '#ffe4e8';
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      const centerLoc = mapLocationCoords['observation_rock'] || { x: width/2, y: height/2 };
      locKeys.forEach(key => {
        if (key !== 'observation_rock' && mapLocationCoords[key]) {
          ctx.moveTo(centerLoc.x, centerLoc.y); ctx.lineTo(mapLocationCoords[key].x, mapLocationCoords[key].y);
        }
      });
      ctx.stroke();
      ctx.restore();

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // 둥글둥글한 장소 노드 렌더링
      locKeys.forEach((key) => {
        const pos = mapLocationCoords[key];
        const name = pos.name || locations[key]?.name || key;
        const icon = getLocationIcon(name);

        // 노드 박스: 하얀 배경 + 두꺼운 파스텔 테두리 + 그림자
        ctx.save();
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = 'rgba(255, 141, 161, 0.1)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 4;
        ctx.beginPath();
        ctx.roundRect(pos.x - 70, pos.y - 45, 140, 90, 20); // 아주 둥근 모서리
        ctx.fill();
        
        ctx.shadowColor = 'transparent';
        ctx.strokeStyle = pos.stroke;
        ctx.lineWidth = 4; // 귀여운 느낌의 두꺼운 라인
        ctx.stroke();
        ctx.restore();

        // 아이콘
        ctx.font = '28px Arial';
        ctx.fillText(icon, pos.x, pos.y - 12);
        
        // 텍스트 (초코 브라운 컬러)
        ctx.font = 'bold 14px "Nunito", sans-serif';
        ctx.fillStyle = '#5c4a4d';
        ctx.fillText(name, pos.x, pos.y + 24);
      });

      // 에이전트 렌더링 (귀여운 동그라미 캐릭터)
      const agentsByLoc = {};
      agents.forEach(agent => {
        const locId = agent.location_id || '__unknown__';
        if (!agentsByLoc[locId]) agentsByLoc[locId] = [];
        agentsByLoc[locId].push(agent);
      });

      Object.keys(agentsByLoc).forEach(locId => {
        let basePos = mapLocationCoords[locId];
        if (!basePos) basePos = { x: 80, y: height - 100 }; // 맵 미상일시 좌하단
        
        const agentsHere = agentsByLoc[locId];
        agentsHere.forEach((agent, i) => {
          const row = Math.floor(i / 3);
          const col = i % 3;
          // 노드 위에 띄워서 배치
          const ax = basePos.x - 24 + col * 24;
          const ay = basePos.y - 65 - row * 34; 

          // 1. 캐릭터 원형 칩 (핑크색 젤리 느낌)
          ctx.fillStyle = '#ff8da1';
          ctx.beginPath();
          ctx.arc(ax, ay, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // 2. 이니셜
          ctx.font = 'bold 12px "Nunito", sans-serif';
          ctx.fillStyle = '#ffffff';
          const initial = String(agent.name || agent.agent_id || '?').trim().slice(0, 1);
          ctx.fillText(initial, ax, ay + 1);

          // 3. 미니 상태바 (귀여운 알약 모양)
          const needs = Object.values(agent.needs || {}).map(Number).filter(Number.isFinite);
          const minNeed = needs.length ? Math.min(...needs) : 100;
          const barWidth = 22;
          const fillWidth = Math.max(0, barWidth * (minNeed / 100));
          
          let barColor = '#5cdb95'; // 그린
          if (minNeed < 30) barColor = '#ff7676'; // 레드
          else if (minNeed < 60) barColor = '#ffbd59'; // 옐로

          // 배경 바
          ctx.fillStyle = '#ffe4e8';
          ctx.beginPath();
          ctx.roundRect(ax - barWidth/2, ay + 15, barWidth, 5, 2.5);
          ctx.fill();
          
          // 채워진 바
          if(fillWidth > 0) {
            ctx.fillStyle = barColor;
            ctx.beginPath();
            ctx.roundRect(ax - barWidth/2, ay + 15, fillWidth, 5, 2.5);
            ctx.fill();
          }
        });
      });
    }

    function renderAgents(agentMap, world) {
      const agents = Array.isArray(agentMap) ? agentMap : Object.values(agentMap);
      const locations = world.locations || {};
      const nameById = Object.fromEntries(agents.map((agent) => [agent.agent_id, agent.name]));
      elements.agentCount.textContent = `${agents.length} agents`;

      if (!agents.length) { elements.agents.innerHTML = '<div class="empty-state">등록된 Agent가 없습니다.</div>'; return; }

      elements.agents.innerHTML = agents.map((agent) => {
        const location = locations[agent.location_id];
        const locationName = location?.name || agent.location_id || '-';
        const needs = Object.entries(agent.needs || {});
        const relationships = Object.entries(agent.relationships || {});
        const memories = Array.isArray(agent.memories) ? agent.memories.slice(-3).reverse() : [];

        return `
          <article class="agent-card">
            <div class="agent-col">
              <header class="agent-card-header">
                <div>
                  <h3 class="agent-name">${escapeHtml(agent.name || agent.agent_id)}</h3>
                  <div class="agent-id">${escapeHtml(agent.agent_id || '-')}</div>
                </div>
                <span class="emotion">${escapeHtml(agent.current_emotion || 'neutral')}</span>
              </header>
              <dl class="agent-meta">
                <dt>위치</dt><dd>${escapeHtml(locationName)}</dd>
                <dt>목표</dt><dd>${escapeHtml(agent.goal || '-')}</dd>
              </dl>
            </div>
            <div class="agent-col">
              <section class="agent-section" style="margin-top:0;">
                <h4 class="section-label">Needs</h4>
                ${needs.length ? needs.map(([name, value]) => renderNeed(name, value)).join('') : '<span class="chip">상태 없음</span>'}
              </section>
              <section class="agent-section">
                <h4 class="section-label">Relationships</h4>
                <div class="chip-list">
                  ${relationships.length ? relationships.map(([id, value]) => `<span class="chip">${escapeHtml(nameById[id] || id)} ${formatSignedNumber(value)}</span>`).join('') : '<span class="chip">관계 없음</span>'}
                </div>
              </section>
            </div>
            <div class="agent-col">
              <section class="agent-section" style="margin-top:0;">
                <h4 class="section-label">Recent memories</h4>
                <ul class="memory-list">
                  ${memories.length ? memories.map((memory) => `<li title="${escapeHtml(memory)}">${escapeHtml(memory)}</li>`).join('') : '<li>아직 기억이 없습니다.</li>'}
                </ul>
              </section>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderNeed(name, rawValue) {
      const numeric = Number(rawValue);
      const value = Number.isFinite(numeric) ? Math.max(0, Math.min(100, numeric)) : 0;
      let colorClass = 'var(--accent)';
      if (value < 30) colorClass = 'var(--danger)'; else if (value < 60) colorClass = 'var(--warning)';
      return `
        <div class="need-row">
          <div class="need-row-top"><span>${escapeHtml(name)}</span><span>${escapeHtml(String(rawValue))}</span></div>
          <div class="need-track"><div class="need-fill" style="width: ${value}%; background: ${colorClass}"></div></div>
        </div>
      `;
    }

    function replaceTimeline(items) {
      timelineItems.length = 0; timelineIds.clear();
      [...items].reverse().forEach((item) => addTimelineItem(item, { prepend: false, render: false }));
      renderTimeline();
    }

    function addTimelineItem(item, { prepend = true, render = true } = {}) {
      const id = item.timeline_id || item.event_id || `${item.created_at}-${item.tick}-${item.summary}`;
      if (timelineIds.has(id)) return;
      timelineIds.add(id);
      const normalized = { ...item, timeline_id: id };
      if (prepend) { timelineItems.unshift(normalized); } else { timelineItems.push(normalized); }
      while (timelineItems.length > MAX_TIMELINE_ITEMS) { const removed = timelineItems.pop(); timelineIds.delete(removed.timeline_id); }
      if (render) renderTimeline();
    }

    function renderTimeline() {
      if (!timelineItems.length) { elements.timeline.innerHTML = '<li class="timeline-empty">아직 발생한 이벤트가 없습니다.</li>'; return; }
      elements.timeline.innerHTML = timelineItems.map((item) => {
        const category = item.category || classifyEvent(item.source_event_type || item.type || '');
        return `
          <li class="timeline-item" data-category="${escapeHtml(category)}">
            <div class="timeline-top">
              <span class="timeline-category">${escapeHtml(category)}</span>
              <time class="timeline-time">${formatDateTime(item.created_at)}</time>
            </div>
            <h3 class="timeline-title">${escapeHtml(item.title || item.source_event_type || '이벤트')}</h3>
            <p class="timeline-summary">${escapeHtml(item.summary || '-')}</p>
            <div class="timeline-footer">Tick ${escapeHtml(String(item.tick ?? '-'))}${renderActorTarget(item)}</div>
          </li>
        `;
      }).join('');
    }

    function renderActorTarget(item) {
      const parts = [];
      if (item.actor_id) parts.push(`actor: ${escapeHtml(item.actor_id)}`);
      if (item.target_id) parts.push(`target: ${escapeHtml(item.target_id)}`);
      return parts.length ? ` · ${parts.join(' · ')}` : '';
    }

    function updateButtonStates(status) {
      const normalizedStatus = String(status || 'NONE').toUpperCase();
      const hasSession = Boolean(simulationId && currentState);
      const running = normalizedStatus === 'RUNNING';
      const paused = normalizedStatus === 'PAUSED';
      const stopped = normalizedStatus === 'STOPPED';

      elements.buttons.start.textContent = stopped ? '새 세션 시작' : '시작';
      elements.buttons.start.disabled = running || paused;
      elements.buttons.pause.disabled = !running;
      elements.buttons.resume.disabled = !paused;
      elements.buttons.tick.disabled = !hasSession || stopped;
      elements.buttons.refresh.disabled = !hasSession;
      elements.buttons.stop.disabled = !hasSession || stopped;
    }

    function setButtonsBusy(busy) {
      Object.values(elements.buttons).forEach((button) => { button.disabled = busy; });
      if (!busy) updateButtonStates(String(currentState?.status || 'NONE').toUpperCase());
    }

    function startStatePolling() {
      if (!simulationId || statePollTimer !== null) return;
      statePollTimer = window.setInterval(() => loadState({ silent: true }), STATE_POLL_INTERVAL_MS);
    }

    function stopStatePolling() {
      if (statePollTimer !== null) { window.clearInterval(statePollTimer); statePollTimer = null; }
    }

    async function resetToIdle() {
      stopStatePolling(); await disconnectTimeline();
      setSimulationId(null); currentState = null;
      replaceTimeline([]); renderIdleState(); setRestStatus('REST 대기', '');
    }

    function setRestStatus(text, stateClass) { elements.restStatus.textContent = text; elements.restStatus.className = `badge ${stateClass || ''}`.trim(); }
    function setWsStatus(text, stateClass) { elements.wsStatus.textContent = text; elements.wsStatus.className = `badge ${stateClass || ''}`.trim(); }
    function showError(error) {
      console.error(error); clearTimeout(toastTimer);
      elements.toast.textContent = error?.message || String(error);
      elements.toast.classList.remove('hidden');
      toastTimer = setTimeout(() => elements.toast.classList.add('hidden'), 5000);
    }

    function formatDateTime(timestamp) {
      const numeric = Number(timestamp);
      if (!Number.isFinite(numeric)) return '-';
      return new Intl.DateTimeFormat('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(new Date(numeric));
    }

    function formatSignedNumber(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return String(value);
      return numeric > 0 ? `+${numeric}` : String(numeric);
    }

    function escapeHtml(value) {
      return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }

    document.querySelectorAll('[data-action]').forEach((button) => { button.addEventListener('click', () => controlSimulation(button.dataset.action)); });
    document.getElementById('clear-timeline-button').addEventListener('click', () => replaceTimeline([]));
    document.getElementById('download-timeline-button').addEventListener('click', () => {
      if (!timelineItems.length) { showError(new Error('다운로드할 데이터가 없습니다.')); return; }
      const orderedItems = [...timelineItems].reverse(); 
      const blob = new Blob([JSON.stringify(orderedItems, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a'); link.href = url;
      link.download = `timeline-${simulationId || 'session'}-${new Date().toISOString().replace(/[:.]/g, '-')}.json`;
      document.body.appendChild(link); link.click(); link.remove(); URL.revokeObjectURL(url);
    });

    async function bootstrap() {
      renderIdleState(); setRestStatus('REST 대기', ''); setWsStatus('Timeline 연결 전', '');
      if (!simulationId) return;
      const existingState = await loadState({ silent: true, clearMissingSession: true });
      if (!existingState) return;
      await loadTimeline({ silent: true }); await connectTimeline();
      if (String(existingState.status || '').toUpperCase() !== 'STOPPED') startStatePolling();
    }

    window.addEventListener('beforeunload', () => { stopStatePolling(); clearTimeout(reconnectTimer); intentionalWsClose = true; websocket?.close(); });
    bootstrap().catch((error) => { setRestStatus('REST 오류', 'error'); showError(error); });
  </script>
</body>
</html>
